<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>4 Gables</title>
  <meta name="description" content="4 Gables" />
  <style>
    :root {
      --ink: #0d0f17;
      --paper: #f4efe6;
      --gold: #c8a24a;
      --gold-bright: #e7cd85;
      --mist: rgba(244, 239, 230, 0.55);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      background: var(--ink);
      color: var(--paper);
      font-family: "Georgia", "Times New Roman", serif;
      overflow: hidden;
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    /* Deep atmospheric backdrop */
    .sky {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(120% 90% at 50% 8%, #1b2033 0%, #12141f 45%, #08090f 100%),
        radial-gradient(60% 40% at 50% 120%, rgba(200,162,74,0.14), transparent 70%);
      z-index: 0;
    }

    /* Faint drifting stars / dust */
    .dust {
      position: fixed;
      inset: -20%;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.35), transparent),
        radial-gradient(1.5px 1.5px at 45% 80%, rgba(231,205,133,0.5), transparent),
        radial-gradient(1px 1px at 85% 25%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1px 1px at 12% 70%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1.5px 1.5px at 60% 15%, rgba(231,205,133,0.4), transparent);
      background-repeat: repeat;
      background-size: 600px 600px;
      opacity: 0.7;
      animation: drift 60s linear infinite;
      z-index: 0;
    }

    @keyframes drift {
      from { transform: translate3d(0, 0, 0); }
      to   { transform: translate3d(-200px, -120px, 0); }
    }

    /* The four gables — a stylized rooflines silhouette */
    .roofline {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      width: 100%;
      height: 42vh;
      z-index: 1;
      pointer-events: none;
    }

    .roofline svg { display: block; width: 100%; height: 100%; }

    .stage {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem;
      animation: rise 1.6s cubic-bezier(.2,.7,.2,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      font-size: clamp(0.6rem, 1.6vw, 0.8rem);
      letter-spacing: 0.6em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: clamp(1rem, 3vw, 1.8rem);
      padding-left: 0.6em;
      opacity: 0;
      animation: fade 1.4s ease 0.4s forwards;
    }

    @keyframes fade { to { opacity: 0.9; } }

    .wordmark {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: clamp(0.4rem, 2.5vw, 1.4rem);
      line-height: 0.9;
    }

    .numeral {
      font-size: clamp(5rem, 26vw, 18rem);
      font-weight: 700;
      font-style: italic;
      background: linear-gradient(180deg, var(--gold-bright) 0%, var(--gold) 55%, #8f6f28 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 6px 24px rgba(200,162,74,0.25));
      position: relative;
    }

    .name {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      font-size: clamp(2.2rem, 11vw, 7rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      text-align: left;
    }

    .name span {
      display: block;
      background: linear-gradient(180deg, #ffffff 0%, #d8d0c0 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* thin gilded rule under the mark */
    .rule {
      width: min(70vw, 520px);
      height: 1px;
      margin: clamp(1.4rem, 4vw, 2.6rem) auto 0;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      position: relative;
      opacity: 0;
      animation: fade 1.4s ease 0.7s forwards;
    }

    .rule::after {
      content: "";
      position: absolute;
      left: 50%; top: 50%;
      width: 7px; height: 7px;
      transform: translate(-50%, -50%) rotate(45deg);
      background: var(--gold-bright);
      box-shadow: 0 0 12px rgba(231,205,133,0.8);
    }

    .footer {
      position: fixed;
      bottom: clamp(1rem, 3vh, 2rem);
      left: 0; right: 0;
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--mist);
      z-index: 3;
    }

    @media (max-width: 620px) {
      .wordmark { flex-direction: column; align-items: center; gap: 0.2rem; }
      .name { align-items: center; text-align: center; }
    }

    @media (prefers-reduced-motion: reduce) {
      .dust, .stage, .eyebrow, .rule { animation: none; opacity: 1; }
      .eyebrow, .rule { opacity: 0.9; }
    }
  </style>
</head>
<body>
  <div class="sky"></div>
  <div class="dust"></div>

  <main class="stage">
    <p class="eyebrow">Established</p>
    <div class="wordmark">
      <span class="numeral">4</span>
      <span class="name"><span>Gables</span></span>
    </div>
    <div class="rule"></div>
  </main>

  <div class="roofline" aria-hidden="true">
    <svg viewBox="0 0 1200 300" preserveAspectRatio="none">
      <defs>
        <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#161a28"/>
          <stop offset="1" stop-color="#05060a"/>
        </linearGradient>
        <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#c8a24a" stop-opacity="0.9"/>
          <stop offset="1" stop-color="#c8a24a" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <!-- four gabled peaks -->
      <path d="M0,300 L0,190 L150,90 L300,190 L450,70 L600,190 L750,60 L900,190 L1050,80 L1200,190 L1200,300 Z" fill="url(#roof)"/>
      <path d="M0,190 L150,90 L300,190 M450,70 L600,190 M600,190 L750,60 L900,190 M900,190 L1050,80 L1200,190" fill="none" stroke="url(#edge)" stroke-width="2"/>
      <!-- glowing attic windows in each gable -->
      <circle cx="150" cy="140" r="6" fill="#e7cd85"/>
      <circle cx="450" cy="120" r="6" fill="#e7cd85"/>
      <circle cx="750" cy="110" r="6" fill="#e7cd85"/>
      <circle cx="1050" cy="130" r="6" fill="#e7cd85"/>
    </svg>
  </div>

  <div class="footer">4 Gables</div>
</body>
</html>
